openapi: 3.0.3
info:
  title: BERSn API Service
  version: v1.0
  description: >
    Node API gateway contract for BERSn. Includes classification, orchestration,
    formula proxy endpoints, run retrieval, and service health/readiness routes.
servers:
  - url: http://localhost:8080
tags:
  - name: System
  - name: Classification
  - name: Orchestration
  - name: Formulas
  - name: Runs
paths:
  /health:
    get:
      tags: [System]
      summary: Liveness check for API service
      responses:
        "200":
          description: API healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthOk"
        "500":
          description: API unhealthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthFail"

  /ready:
    get:
      tags: [System]
      summary: Readiness check for API + DB + calc service
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyOk"
        "503":
          description: Not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyFail"

  /api/bersn/classification/normalize:
    post:
      tags: [Classification]
      summary: Normalize mixed-use classification for BERSn 3-1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassificationNormalizeRequest"
      responses:
        "200":
          description: Normalization result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassificationNormalizeResponse"
        "400":
          description: Normalization input validation failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassificationNormalizeError"
        "429":
          description: API rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiRateLimitedError"

  /api/bersn/calc:
    post:
      tags: [Orchestration]
      summary: Create and run a BERSn calculation run
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunCalcRequest"
      responses:
        "200":
          description: Run created and completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunCalcResponse"
        "400":
          $ref: "#/components/responses/ApiValidationError"
        "429":
          $ref: "#/components/responses/ApiRateLimited"
        "500":
          $ref: "#/components/responses/ApiInternalError"

  /api/bersn/formulas/afe:
    post:
      tags: [Formulas]
      summary: Eq. 3.1 AFe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StepRequestLegacy"
      responses:
        "200":
          description: Formula execution success envelope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StepResponseAFe"
        "400":
          $ref: "#/components/responses/ApiValidationError"
        "404":
          $ref: "#/components/responses/ApiNotFoundError"
        "422":
          $ref: "#/components/responses/ApiInputValidationError"
        "429":
          $ref: "#/components/responses/ApiRateLimited"
        "500":
          $ref: "#/components/responses/ApiInternalError"

