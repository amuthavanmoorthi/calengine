  /api/bersn/runs/{calc_run_id}:
    get:
      tags: [Runs]
      summary: Get run details with step artifacts
      parameters:
        - in: path
          name: calc_run_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Run details found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunDetailsResponse"
        "400":
          $ref: "#/components/responses/ApiValidationError"
        "404":
          $ref: "#/components/responses/ApiNotFoundError"
        "429":
          $ref: "#/components/responses/ApiRateLimited"
        "500":
          $ref: "#/components/responses/ApiInternalError"

components:
  responses:
    ApiValidationError:
      description: API request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    ApiInputValidationError:
      description: Input or prerequisite validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    ApiNotFoundError:
      description: Requested entity not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    ApiInternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    ApiRateLimited:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiRateLimitedError"
    ApiFormulaSuccess:
      description: Formula execution success envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiSuccessAny"

  schemas:
    ClassificationSegment:
      type: object
      required: [appendix1_code, area_m2]
      properties:
        appendix1_code:
          type: string
          minLength: 1
          maxLength: 160
        table_3_2_label:
          type: string
          minLength: 1
          maxLength: 160
        display_name:
          type: string
          maxLength: 160
        area_m2:
          type: number
        operation_mode:
          type: string
          maxLength: 160
        urban_zone:
          type: string
          maxLength: 160

    ClassificationNormalizeRequest:
      type: object
      required: [total_above_ground_floor_area_m2, segments]
      properties:
        total_above_ground_floor_area_m2:
          type: number
        segments:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ClassificationSegment"

    ClassificationNormalizeResponse:
      type: object
      required: [ok, result]
      properties:
        ok:
          type: boolean
          enum: [true]
        result:
          type: object
          additionalProperties: true

    ClassificationNormalizeError:
      type: object
      required: [ok, error_code, message, error]
      properties:
        ok:
          type: boolean
          enum: [false]
        error_code:
          type: string
          enum: [BERSN_3_1_NORMALIZATION_ERROR]
        message:
          type: string
        error:
          type: string

    RunCalcRequest:
      type: object
      required: [project_id, branch_type, formula_version, inputs]
      properties:
        project_id:
          type: string
          minLength: 1
          maxLength: 128
        branch_type:
          type: string
          minLength: 1
          maxLength: 128
        formula_version:
          type: string
          enum: [v1.0]
        inputs:
          type: object
          additionalProperties: true

    StepRequestLegacy:
      type: object
      required: [project_id, calc_run_id, formula_version]
      properties:
        project_id:
          type: string
          minLength: 1
          maxLength: 128
        calc_run_id:
          type: string
          minLength: 1
          maxLength: 128
        formula_version:
          type: string
          enum: [v1.0]

    StepRequestStateless:
      type: object
      required: [calc_run_id, formula_version, inputs]
      properties:
        calc_run_id:
          type: string
          minLength: 1
          maxLength: 128
        formula_version:
          type: string
          enum: [v1.0]
        inputs:
          type: object
          additionalProperties: true

    StepRequestDbBacked:
      type: object
      required: [project_id, calc_run_id, formula_version, inputs]
      properties:
        project_id:
          type: string
          minLength: 1
          maxLength: 128
        calc_run_id:
          type: string
          minLength: 1
          maxLength: 128
        formula_version:
          type: string
          enum: [v1.0]
        inputs:
          type: object
          additionalProperties: true

    ElevatorGroupInput:
      type: object
      required: [Nej, Eelj, YOHj]
      properties:
        Nej:
          type: number
        Eelj:
          type: number
        YOHj:
          type: number
      additionalProperties: true

    InputsGeneralEEI:
      type: object
      required: [AF, elevators, AEUI, LEUI, EAC, EEV, Es, EL, Et]
      properties:
        AF: { type: number }
        AEUI: { type: number }
        LEUI: { type: number }
        EAC: { type: number }
        EEV: { type: number }
        Es: { type: number }
        EL: { type: number }
        Et: { type: number }
        elevators:
          type: array
          items:
            $ref: "#/components/schemas/ElevatorGroupInput"
      additionalProperties: true

    InputsEEIGeneral:
      type: object
      required: [a, b, c, EAC, EEV, Es, EL, Et]
      properties:
        a: { type: number }
        b: { type: number }
        c: { type: number }
        EAC: { type: number }
        EEV: { type: number }
        Es: { type: number }
        EL: { type: number }
        Et: { type: number }
      additionalProperties: true

    InputsScoreGeneral:
      type: object
      required: [EEI]
      properties:
        EEI: { type: number }
      additionalProperties: true

    InputsScaleValuesGeneral:
      type: object
      required: [AEUI, LEUI, EEUI, EtEUI, UR]
      properties:
        AEUI: { type: number }
        LEUI: { type: number }
        EEUI: { type: number }
        EtEUI: { type: number }
        UR: { type: number }
      additionalProperties: true

    InputsIndicatorsGeneral:
      type: object
      required: [SCOREEE, EUIn, EUIg, EUIm, EUImax, beta1, CFn]
      properties:
        SCOREEE: { type: number }
        EUIn: { type: number }
        EUIg: { type: number }
        EUIm: { type: number }
        EUImax: { type: number }
        beta1: { type: number }
        CFn: { type: number }
      additionalProperties: true

    InputsGradeGeneral:
      type: object
      required: [SCOREEE, EUI_star, EUIn, EUIg, EUImax]
      properties:
        SCOREEE: { type: number }
        EUI_star: { type: number }
        EUIn: { type: number }
        EUIg: { type: number }
        EUImax: { type: number }
      additionalProperties: true

    InputsGeneralFull:
      type: object
      required: [AF, elevators, AEUI, LEUI, EEUI, UR, Es, Et, beta1, CFn]
      properties:
        AF: { type: number }
        AEUI: { type: number }
        LEUI: { type: number }
        EEUI: { type: number }
        UR: { type: number }
        Es: { type: number }
        Et: { type: number }
        beta1: { type: number }
        CFn: { type: number }
        elevators:
          type: array
          items:
